name: CI - Result Service (Node.js)

on:
  pull_request:
    branches:
      - dev
      - main
    paths:
      - "result/**"
  workflow_dispatch:

concurrency:
  group: result-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  AWS_REGION: ap-southeast-1
  ENVIRONMENT: dev
  CONTEXT_PATH: ./result
  IMAGE_NAME: result
  SONAR_PROJECT_KEY: result-service
  SONAR_ORGANIZATION: huycon2352code

jobs:
  build-secure-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---- 1. THIẾT LẬP NODE.JS & TỐI ƯU CACHE NPM ----
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'result/package-lock.json'

      - name: Install Dependencies
        run: |
          cd ${{ env.CONTEXT_PATH }}
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      # ---- 2. CHẠY UNIT TEST & XUẤT BÁO CÁO COVERAGE ----
      - name: Run Unit Tests
        run: |
          cd ${{ env.CONTEXT_PATH }}
          # Chạy test và tự động xuất dữ liệu coverage (Đảm bảo package.json đã cấu hình script test)
          npm test -- --coverage --watchAll=false || echo "No tests specified"

      # -------------------------------------------------------------
      # 3. QUÉT MÃ NGUỒN (SAST) VỚI SONARQUBE CLOUD
      # -------------------------------------------------------------
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.projectBaseDir=${{ env.CONTEXT_PATH }}
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/tests/**
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -X

      # ---- 4. TỐI ƯU CACHE CHO DOCKER LAYERS (BUILDKIT) ----
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -------------------------------------------------------------
      # 5. BUILD DOCKER IMAGE (CHỈ LƯU LOCAL RUNNER)
      # -------------------------------------------------------------
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT_PATH }}
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          push: false 
          load: true  
          cache-from: type=gha 
          cache-to: type=gha,mode=max 

      # -------------------------------------------------------------
      # 6. QUÉT BẢO MẬT DOCKER IMAGE (TRIVY IMAGE)
      # -------------------------------------------------------------
      - name: Run Trivy vulnerability scanner on Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'table'
          exit-code: '0' 
          severity: 'CRITICAL,HIGH'