name: CI - Worker Service (.NET)

on:
  pull_request:
    branches:
      - dev
      - main
    paths:
      - "worker/**"
  workflow_dispatch:

concurrency:
  group: worker-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  AWS_REGION: ap-southeast-1
  ENVIRONMENT: dev
  CONTEXT_PATH: ./worker
  IMAGE_NAME: worker
  SONAR_PROJECT_KEY: worker-service
  SONAR_ORGANIZATION: huycon2352code

jobs:
  build-secure-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---- 1. THIẾT LẬP .NET SDK & TỐI ƯU CACHE NUGET ----
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0' # Thay đổi version (.NET 6/7/8/9) cho khớp với Worker.csproj của bạn
          cache: true
          cache-dependency-path: '${{ env.CONTEXT_PATH }}/Worker.csproj'

      - name: Restore Dependencies
        run: |
          cd ${{ env.CONTEXT_PATH }}
          dotnet restore

      # ---- 2. CHẠY UNIT TEST & XUẤT COVERAGE CHO .NET ----
      - name: Run Unit Tests
        run: |
          cd ${{ env.CONTEXT_PATH }}
          # Lệnh này tự chạy test nếu có project test, xuất file opencover phục vụ cho SonarCloud
          dotnet test --configuration Release /p:CollectCoverage=true /p:CoverletOutputFormat=opencover

      # -------------------------------------------------------------
      # 3. QUÉT MÃ NGUỒN (SAST) VỚI SONARQUBE CLOUD (CHO C#)
      # -------------------------------------------------------------
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.projectBaseDir=${{ env.CONTEXT_PATH }}
            -Dsonar.sources=.
            -Dsonar.exclusions=**/obj/**,**/bin/**
            -Dsonar.cs.opencover.reportsPaths=**/coverage.opencover.xml
            -X

      # ---- 4. TỐI ƯU CACHE CHO DOCKER LAYERS (BUILDKIT) ----
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -------------------------------------------------------------
      # 5. BUILD DOCKER IMAGE (CHỈ LƯU LOCAL RUNNER)
      # -------------------------------------------------------------
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT_PATH }}
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          push: false 
          load: true  
          cache-from: type=gha 
          cache-to: type=gha,mode=max 

      # -------------------------------------------------------------
      # 6. QUÉT BẢO MẬT DOCKER IMAGE (TRIVY IMAGE)
      # -------------------------------------------------------------
      - name: Run Trivy vulnerability scanner on Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'table'
          exit-code: '0' 
          severity: 'CRITICAL,HIGH'