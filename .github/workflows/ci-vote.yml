name: CI-Service-Vote

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

  pull_request:
    branches: [ main ]
    paths:
      - 'vote/**'

jobs:
  sonar-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_URL }}

  build-secure-push-tag:
    needs: sonar-scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | \
          docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/vote-app:${GITHUB_SHA} \
            ./vote

      - name: Trivy Scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            ${{ secrets.DOCKER_USERNAME }}/vote-app:${GITHUB_SHA}

      - name: Push image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/vote-app:${GITHUB_SHA}

      - name: Clone GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.REPO_APP_OP }}
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Update image tag
        run: |
          set -ex

          ENV=${{ github.event.inputs.environment || 'dev' }}

          cd gitops/apps/$ENV

          cat kustomization.yaml

          kustomize edit set image \
          ${{ secrets.DOCKER_USERNAME }}/vote-app=${{ secrets.DOCKER_USERNAME }}/vote-app:${GITHUB_SHA}

          cat kustomization.yaml

      - name: Commit & push
        run: |
          set -ex

          ENV=${{ github.event.inputs.environment || 'dev' }}

          cd gitops

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          git commit -m "update $ENV vote image to ${GITHUB_SHA}" || echo "No changes"

          git pull --rebase origin main
          git push origin main
